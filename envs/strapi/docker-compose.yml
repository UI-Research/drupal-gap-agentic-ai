services:
  strapi:
    build: .
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=1337
      - APP_KEYS=key1,key2,key3,key4
      - API_TOKEN_SALT=tokensalt123
      - ADMIN_JWT_SECRET=adminjwt123
      - JWT_SECRET=jwt123
      - TRANSFER_TOKEN_SALT=transfer123
    restart: unless-stopped
